<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#5eead4"/></linearGradient>
    <linearGradient id="blue3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="emer3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="orange3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ea580c"/><stop offset="100%" stop-color="#fb923c"/></linearGradient>
    <linearGradient id="red3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#f87171"/></linearGradient>
    <linearGradient id="cyan3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0891b2"/><stop offset="100%" stop-color="#67e8f9"/></linearGradient>
    <filter id="s3"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <marker id="m3" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/></marker>
    <marker id="m3t" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#5eead4"/></marker>
    <marker id="m3b" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#60a5fa"/></marker>
    <marker id="m3o" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#fb923c"/></marker>
    <marker id="m3r" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f87171"/></marker>
    <marker id="m3e" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#34d399"/></marker>
  </defs>
  <rect width="900" height="560" fill="url(#bg3)" rx="10"/>

  <text x="450" y="32" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Task Execution Flow</text>
  <text x="450" y="50" text-anchor="middle" fill="#64748b" font-size="11">TaskRunner::run_task() — process spawn, biased select, event parsing, cancel</text>

  <!-- Step 1: Command Build -->
  <rect x="30" y="70" width="250" height="95" rx="10" fill="#134e4a" stroke="#0d9488" stroke-width="1" filter="url(#s3)"/>
  <text x="155" y="92" text-anchor="middle" fill="#99f6e4" font-size="12" font-weight="700">1. Build Command</text>
  <text x="45" y="112" fill="#94a3b8" font-size="9">codex exec [-C cwd] -o out.md --json</text>
  <text x="45" y="127" fill="#94a3b8" font-size="9">  [--full-auto | -s sandbox]</text>
  <text x="45" y="142" fill="#94a3b8" font-size="9">  [-m model] [-p profile] &lt;prompt&gt;</text>
  <text x="45" y="157" fill="#6b7280" font-size="8">review: codex exec review --uncommitted ...</text>

  <!-- Step 2: Spawn -->
  <line x1="280" y1="117" x2="315" y2="117" stroke="#5eead4" stroke-width="1.8" marker-end="url(#m3t)"/>
  <rect x="315" y="70" width="250" height="95" rx="10" fill="#052e16" stroke="#059669" stroke-width="1" filter="url(#s3)"/>
  <text x="440" y="92" text-anchor="middle" fill="#a7f3d0" font-size="12" font-weight="700">2. Spawn Process</text>
  <text x="330" y="112" fill="#94a3b8" font-size="9">Command::spawn()</text>
  <text x="330" y="127" fill="#6ee7b7" font-size="9" font-weight="600">setpgid(0, 0)</text>
  <text x="430" y="127" fill="#6b7280" font-size="8">← process group isolation</text>
  <text x="330" y="142" fill="#94a3b8" font-size="9">stdout: piped  stderr: piped</text>
  <text x="330" y="157" fill="#94a3b8" font-size="9">meta → status: Running, pid: set</text>

  <!-- Step 3: stderr drain -->
  <line x1="565" y1="117" x2="600" y2="117" stroke="#5eead4" stroke-width="1.8" marker-end="url(#m3t)"/>
  <rect x="600" y="70" width="270" height="95" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" filter="url(#s3)"/>
  <text x="735" y="92" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">3. Stderr Drain</text>
  <text x="615" y="112" fill="#94a3b8" font-size="9">spawn_stderr_drain()</text>
  <text x="615" y="127" fill="#a5b4fc" font-size="9" font-weight="600">Separate tokio task</text>
  <text x="615" y="142" fill="#94a3b8" font-size="9">→ logs/{name}.stderr.log</text>
  <text x="615" y="157" fill="#6b7280" font-size="8">Prevents pipe buffer deadlock (4-64KB)</text>

  <!-- Main loop box -->
  <rect x="30" y="185" width="840" height="200" rx="10" fill="#0c1222" stroke="#7c3aed" stroke-width="1.5" filter="url(#s3)"/>
  <text x="450" y="210" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700">4. Main Loop — biased select!</text>

  <!-- Biased select visual -->
  <rect x="55" y="225" width="370" height="145" rx="8" fill="#1e1b4b" stroke="#4338ca" stroke-width="0.8"/>
  <text x="240" y="245" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">tokio::select! { biased;</text>

  <!-- Branch 1: stdout (priority) -->
  <rect x="70" y="255" width="340" height="48" rx="6" fill="#052e16" stroke="#059669" stroke-width="0.8"/>
  <text x="80" y="272" fill="#6ee7b7" font-size="10" font-weight="700">① stdout.next_line()</text>
  <text x="260" y="272" fill="#4ade80" font-size="9">← PRIORITY (biased)</text>
  <text x="80" y="290" fill="#94a3b8" font-size="9">Parse JSONL → CodexEvent → update meta counters</text>
  <text x="80" y="298" fill="#6b7280" font-size="8">Inline: if cancel.is_cancelled() → break (responsive cancel for chatty tasks)</text>

  <!-- Branch 2: cancel -->
  <rect x="70" y="310" width="340" height="35" rx="6" fill="#1c0a0a" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="80" y="327" fill="#fca5a5" font-size="10" font-weight="700">② cancel.cancelled()</text>
  <text x="260" y="327" fill="#f87171" font-size="9">→ kill_and_wait()</text>
  <text x="80" y="340" fill="#6b7280" font-size="8">Only fires when stdout is not ready → prevents misclassifying done tasks</text>

  <text x="240" y="360" text-anchor="middle" fill="#c4b5fd" font-size="10">}</text>

  <!-- Event parsing detail -->
  <rect x="450" y="225" width="400" height="145" rx="8" fill="#0c1a2e" stroke="#0369a1" stroke-width="0.8"/>
  <text x="650" y="245" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">CodexEvent Parsing (event.rs)</text>

  <g font-size="9">
    <rect x="465" y="255" width="160" height="20" rx="4" fill="#082f49"/><text x="545" y="269" text-anchor="middle" fill="#38bdf8">SessionStart { session_id }</text>
    <rect x="635" y="255" width="195" height="20" rx="4" fill="#082f49"/><text x="732" y="269" text-anchor="middle" fill="#38bdf8">TokenCount { in, out }</text>
    <rect x="465" y="280" width="160" height="20" rx="4" fill="#082f49"/><text x="545" y="294" text-anchor="middle" fill="#38bdf8">ReadFile { file_path }</text>
    <rect x="635" y="280" width="195" height="20" rx="4" fill="#082f49"/><text x="732" y="294" text-anchor="middle" fill="#38bdf8">ExecCommand { command }</text>
    <rect x="465" y="305" width="160" height="20" rx="4" fill="#082f49"/><text x="545" y="319" text-anchor="middle" fill="#38bdf8">TaskComplete</text>
    <rect x="635" y="305" width="195" height="20" rx="4" fill="#082f49"/><text x="732" y="319" text-anchor="middle" fill="#38bdf8">Other (raw JSON)</text>
  </g>

  <text x="650" y="348" text-anchor="middle" fill="#64748b" font-size="9">Meta update every 20 events (META_UPDATE_INTERVAL)</text>
  <text x="650" y="362" text-anchor="middle" fill="#64748b" font-size="9">Counters: events_count, input_tokens, output_tokens, files_read, commands_run</text>

  <!-- Step 5: Completion -->
  <rect x="30" y="400" width="400" height="65" rx="10" fill="#052e16" stroke="#059669" stroke-width="1" filter="url(#s3)"/>
  <text x="230" y="422" text-anchor="middle" fill="#a7f3d0" font-size="12" font-weight="700">5a. Normal Completion</text>
  <text x="45" y="440" fill="#94a3b8" font-size="9">stdout EOF → wait child exit code → final meta write</text>
  <text x="45" y="455" fill="#94a3b8" font-size="9">exit 0 → Done · exit non-0 → Failed · stdout error → Failed (not overwritten)</text>

  <!-- Step 6: Cancel -->
  <rect x="460" y="400" width="410" height="65" rx="10" fill="#1c0a0a" stroke="#dc2626" stroke-width="1" filter="url(#s3)"/>
  <text x="665" y="422" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">5b. Cancellation (kill_and_wait)</text>
  <text x="475" y="440" fill="#94a3b8" font-size="9">SIGTERM → process group (-pgid) → 3 sec timeout → SIGKILL</text>
  <text x="475" y="455" fill="#94a3b8" font-size="9">Reap child → meta: Cancelled · Non-Unix fallback: child.kill()</text>

  <!-- Step 6: Output -->
  <rect x="30" y="480" width="840" height="65" rx="10" fill="#0c1a2e" stroke="#0369a1" stroke-width="1" filter="url(#s3)"/>
  <text x="450" y="502" text-anchor="middle" fill="#bae6fd" font-size="12" font-weight="700">6. Outputs Written</text>
  <g font-size="10">
    <rect x="55" y="510" width="175" height="22" rx="4" fill="#082f49"/><text x="142" y="525" text-anchor="middle" fill="#38bdf8" font-weight="600">outputs/{name}.md</text>
    <rect x="245" y="510" width="175" height="22" rx="4" fill="#082f49"/><text x="332" y="525" text-anchor="middle" fill="#38bdf8" font-weight="600">logs/{name}.jsonl</text>
    <rect x="435" y="510" width="195" height="22" rx="4" fill="#082f49"/><text x="532" y="525" text-anchor="middle" fill="#fbbf24" font-weight="600">logs/{name}.meta.json</text>
    <rect x="645" y="510" width="200" height="22" rx="4" fill="#082f49"/><text x="745" y="525" text-anchor="middle" fill="#38bdf8" font-weight="600">logs/{name}.stderr.log</text>
  </g>
  <text x="450" y="545" text-anchor="middle" fill="#475569" font-size="8">meta.json: atomic write (.tmp + rename) — readers never see partial JSON</text>
</svg>
