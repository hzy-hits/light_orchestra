<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <linearGradient id="w0" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="w1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="w2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#9333ea"/><stop offset="100%" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="fail" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#f87171"/></linearGradient>
    <filter id="s2"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <marker id="ma" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/></marker>
    <marker id="mr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f87171"/></marker>
  </defs>
  <rect width="900" height="440" fill="url(#bg2)" rx="10"/>

  <text x="450" y="32" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Wave Scheduling (Kahn's Algorithm)</text>
  <text x="450" y="50" text-anchor="middle" fill="#64748b" font-size="11">depends_on DAG → topological waves · parallel within, sequential between</text>

  <!-- Left: DAG -->
  <rect x="30" y="70" width="340" height="310" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1" filter="url(#s2)"/>
  <text x="200" y="95" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Task Dependency DAG</text>

  <!-- DAG nodes -->
  <circle cx="100" cy="150" r="28" fill="url(#w0)" filter="url(#s2)"/>
  <text x="100" y="154" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">A</text>
  <circle cx="260" cy="150" r="28" fill="url(#w0)" filter="url(#s2)"/>
  <text x="260" y="154" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">B</text>
  <circle cx="100" cy="250" r="28" fill="url(#w1)" filter="url(#s2)"/>
  <text x="100" y="254" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">C</text>
  <circle cx="260" cy="250" r="28" fill="url(#w1)" filter="url(#s2)"/>
  <text x="260" y="254" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">D</text>
  <circle cx="180" cy="340" r="28" fill="url(#w2)" filter="url(#s2)"/>
  <text x="180" y="344" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">E</text>

  <!-- DAG edges -->
  <line x1="100" y1="178" x2="100" y2="222" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ma)"/>
  <line x1="125" y1="170" x2="235" y2="230" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ma)"/>
  <line x1="260" y1="178" x2="260" y2="222" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ma)"/>
  <line x1="120" y1="272" x2="158" y2="318" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ma)"/>
  <line x1="240" y1="272" x2="202" y2="318" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#ma)"/>

  <!-- Legend labels on DAG -->
  <text x="55" y="150" fill="#6ee7b7" font-size="9" text-anchor="end">no deps</text>
  <text x="310" y="150" fill="#6ee7b7" font-size="9">no deps</text>
  <text x="52" y="250" fill="#93c5fd" font-size="9" text-anchor="end">dep: A</text>
  <text x="310" y="250" fill="#93c5fd" font-size="9">dep: A,B</text>
  <text x="180" y="374" text-anchor="middle" fill="#d8b4fe" font-size="9">dep: C,D</text>

  <!-- Right: Wave timeline -->
  <rect x="410" y="70" width="460" height="310" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1" filter="url(#s2)"/>
  <text x="640" y="95" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Execution Timeline</text>

  <!-- Time arrow -->
  <line x1="435" y1="115" x2="435" y2="355" stroke="#475569" stroke-width="1.5" marker-end="url(#ma)"/>
  <text x="430" y="370" text-anchor="middle" fill="#64748b" font-size="9">time →</text>

  <!-- Wave 0 -->
  <rect x="455" y="115" width="390" height="60" rx="8" fill="#064e3b" opacity="0.5" stroke="#059669" stroke-width="0.8"/>
  <text x="465" y="132" fill="#6ee7b7" font-size="11" font-weight="700">Wave 0</text>
  <text x="545" y="132" fill="#4ade80" font-size="9">(parallel)</text>
  <rect x="465" y="140" width="170" height="26" rx="5" fill="url(#w0)" opacity="0.85"/>
  <text x="550" y="157" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">A: fee_calculator</text>
  <rect x="645" y="140" width="170" height="26" rx="5" fill="url(#w0)" opacity="0.85"/>
  <text x="730" y="157" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">B: retry_job</text>

  <!-- Wave barrier -->
  <line x1="455" y1="185" x2="845" y2="185" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="850" y="189" fill="#64748b" font-size="8">barrier</text>

  <!-- Wave 1 -->
  <rect x="455" y="195" width="390" height="60" rx="8" fill="#172554" opacity="0.5" stroke="#2563eb" stroke-width="0.8"/>
  <text x="465" y="212" fill="#93c5fd" font-size="11" font-weight="700">Wave 1</text>
  <text x="545" y="212" fill="#60a5fa" font-size="9">(parallel, after Wave 0)</text>
  <rect x="465" y="220" width="170" height="26" rx="5" fill="url(#w1)" opacity="0.85"/>
  <text x="550" y="237" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">C: analyze</text>
  <rect x="645" y="220" width="170" height="26" rx="5" fill="url(#w1)" opacity="0.85"/>
  <text x="730" y="237" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">D: cross_review</text>

  <!-- Wave barrier -->
  <line x1="455" y1="265" x2="845" y2="265" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="850" y="269" fill="#64748b" font-size="8">barrier</text>

  <!-- Wave 2 -->
  <rect x="455" y="275" width="390" height="55" rx="8" fill="#3b0764" opacity="0.4" stroke="#9333ea" stroke-width="0.8"/>
  <text x="465" y="292" fill="#d8b4fe" font-size="11" font-weight="700">Wave 2</text>
  <text x="545" y="292" fill="#c084fc" font-size="9">(after Wave 1)</text>
  <rect x="465" y="300" width="170" height="26" rx="5" fill="url(#w2)" opacity="0.85"/>
  <text x="550" y="317" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">E: final_report</text>

  <!-- Bottom: failure behavior -->
  <rect x="30" y="395" width="840" height="35" rx="8" fill="#1c0a0a" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="50" y="417" fill="#fca5a5" font-size="10" font-weight="600">On failure:</text>
  <text x="130" y="417" fill="#94a3b8" font-size="10">If any task in Wave N fails → remaining tasks finish → Waves N+1..M skipped (marked Cancelled)</text>
  <text x="740" y="417" fill="#fca5a5" font-size="10">|  Ctrl+C → cancel all</text>
</svg>
