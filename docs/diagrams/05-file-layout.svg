<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient>
    <filter id="s5"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter>
    <marker id="m5w" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#34d399"/></marker>
    <marker id="m5r" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f472b6"/></marker>
  </defs>
  <rect width="900" height="420" fill="url(#bg5)" rx="10"/>

  <text x="450" y="32" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">File Layout &amp; Data Flow</text>
  <text x="450" y="50" text-anchor="middle" fill="#64748b" font-size="11">base_dir/ — file-based IPC between runner, dashboard, and MCP consumers</text>

  <!-- Directory tree -->
  <rect x="30" y="70" width="380" height="330" rx="10" fill="#0c1a2e" stroke="#0369a1" stroke-width="1.2" filter="url(#s5)"/>
  <text x="220" y="95" text-anchor="middle" fill="#bae6fd" font-size="14" font-weight="700">base_dir/</text>

  <!-- outputs/ section -->
  <g font-size="11" fill="#e2e8f0">
    <text x="50" y="120" fill="#7dd3fc" font-weight="700" font-size="12">outputs/</text>
    <rect x="70" y="128" width="320" height="22" rx="4" fill="#082f49"/>
    <text x="80" y="143" fill="#38bdf8" font-size="10">{task_name}.md</text>
    <text x="260" y="143" fill="#64748b" font-size="9">Codex final result (markdown)</text>
  </g>

  <!-- logs/ section -->
  <g font-size="11" fill="#e2e8f0">
    <text x="50" y="175" fill="#7dd3fc" font-weight="700" font-size="12">logs/</text>

    <rect x="70" y="183" width="320" height="22" rx="4" fill="#082f49"/>
    <text x="80" y="198" fill="#38bdf8" font-size="10">{task_name}.jsonl</text>
    <text x="260" y="198" fill="#64748b" font-size="9">Full JSONL event stream</text>

    <rect x="70" y="210" width="320" height="22" rx="4" fill="#082f49"/>
    <text x="80" y="225" fill="#fbbf24" font-size="10" font-weight="600">{task_name}.meta.json</text>
    <text x="290" y="225" fill="#64748b" font-size="9">Live task status</text>

    <rect x="70" y="237" width="320" height="22" rx="4" fill="#082f49"/>
    <text x="80" y="252" fill="#38bdf8" font-size="10">{task_name}.stderr.log</text>
    <text x="290" y="252" fill="#64748b" font-size="9">Stderr drain</text>

    <rect x="70" y="264" width="320" height="22" rx="4" fill="#082f49"/>
    <text x="80" y="279" fill="#38bdf8" font-size="10">run.meta.json</text>
    <text x="230" y="279" fill="#64748b" font-size="9">Run-level status (serve only)</text>

    <rect x="70" y="291" width="320" height="22" rx="4" fill="#082f49"/>
    <text x="80" y="306" fill="#38bdf8" font-size="10">messages/{thread_id}.jsonl</text>
    <text x="310" y="306" fill="#64748b" font-size="9">Swarm mail</text>
  </g>

  <!-- shared/ section -->
  <g font-size="11" fill="#e2e8f0">
    <text x="50" y="340" fill="#7dd3fc" font-weight="700" font-size="12">shared/</text>

    <rect x="70" y="348" width="320" height="22" rx="4" fill="#082f49"/>
    <text x="80" y="363" fill="#38bdf8" font-size="10">facts.json</text>
    <text x="200" y="363" fill="#64748b" font-size="9">Shared context (key-value store)</text>

    <text x="70" y="388" fill="#475569" font-size="8">Atomic writes: .tmp + rename — readers never see partial JSON</text>
  </g>

  <!-- Right side: who reads/writes what -->
  <rect x="440" y="70" width="430" height="330" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1" filter="url(#s5)"/>
  <text x="655" y="95" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Read / Write Matrix</text>

  <!-- Table header -->
  <line x1="460" y1="108" x2="850" y2="108" stroke="#334155" stroke-width="1"/>
  <text x="510" y="122" fill="#94a3b8" font-size="10" font-weight="600">File</text>
  <text x="660" y="122" fill="#34d399" font-size="10" font-weight="600">Writers</text>
  <text x="800" y="122" fill="#f472b6" font-size="10" font-weight="600">Readers</text>
  <line x1="460" y1="130" x2="850" y2="130" stroke="#334155" stroke-width="0.5"/>

  <!-- Rows -->
  <g font-size="9">
    <text x="470" y="148" fill="#38bdf8">{name}.md</text>
    <text x="640" y="148" fill="#6ee7b7">Codex CLI (-o flag)</text>
    <text x="780" y="148" fill="#f9a8d4">MCP read_output</text>

    <line x1="460" y1="155" x2="850" y2="155" stroke="#1e293b" stroke-width="0.5"/>
    <text x="470" y="173" fill="#38bdf8">{name}.jsonl</text>
    <text x="640" y="173" fill="#6ee7b7">TaskRunner (append)</text>
    <text x="780" y="173" fill="#f9a8d4">tail command</text>

    <line x1="460" y1="180" x2="850" y2="180" stroke="#1e293b" stroke-width="0.5"/>
    <text x="470" y="198" fill="#fbbf24" font-weight="600">{name}.meta.json</text>
    <text x="640" y="198" fill="#6ee7b7">TaskRunner (atomic)</text>
    <text x="780" y="198" fill="#f9a8d4">dashboard, status,</text>
    <text x="780" y="210" fill="#f9a8d4">get_status, tail</text>

    <line x1="460" y1="218" x2="850" y2="218" stroke="#1e293b" stroke-width="0.5"/>
    <text x="470" y="236" fill="#38bdf8">{name}.stderr.log</text>
    <text x="640" y="236" fill="#6ee7b7">stderr drain task</text>
    <text x="780" y="236" fill="#f9a8d4">MCP read_stderr</text>

    <line x1="460" y1="243" x2="850" y2="243" stroke="#1e293b" stroke-width="0.5"/>
    <text x="470" y="261" fill="#38bdf8">run.meta.json</text>
    <text x="640" y="261" fill="#6ee7b7">RunCoordinator</text>
    <text x="780" y="261" fill="#f9a8d4">MCP get_status</text>

    <line x1="460" y1="268" x2="850" y2="268" stroke="#1e293b" stroke-width="0.5"/>
    <text x="470" y="286" fill="#38bdf8">messages/{tid}.jsonl</text>
    <text x="640" y="286" fill="#6ee7b7">MCP send_message</text>
    <text x="780" y="286" fill="#f9a8d4">MCP list_mailbox</text>

    <line x1="460" y1="293" x2="850" y2="293" stroke="#1e293b" stroke-width="0.5"/>
    <text x="470" y="311" fill="#38bdf8">facts.json</text>
    <text x="640" y="311" fill="#6ee7b7">MCP write_fact</text>
    <text x="780" y="311" fill="#f9a8d4">MCP read_facts,</text>
    <text x="780" y="323" fill="#f9a8d4">build_preamble()</text>
  </g>

  <!-- Legend -->
  <rect x="460" y="340" width="390" height="48" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="480" y="358" fill="#6ee7b7" font-size="9">● Write (green)</text>
  <text x="580" y="358" fill="#f9a8d4" font-size="9">● Read (pink)</text>
  <text x="680" y="358" fill="#fbbf24" font-size="9">● Critical (yellow = most polled)</text>
  <text x="480" y="378" fill="#475569" font-size="8">meta.json is the central IPC mechanism — every consumer polls it for task state</text>
</svg>
